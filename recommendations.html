<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Outfit recommendations tailored to your body type — anime streetwear that actually fits.">
  <title>Your Recommendations — Shonowear</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080810'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='13' font-weight='900' fill='%23e8153a'%3ESW%3C/text%3E%3C/svg%3E">
  <!-- CRITICAL: Set theme before CSS loads to prevent flash of light mode -->
  <script>!function(){var t=localStorage.getItem("sw_theme");if(!t){localStorage.setItem("sw_theme","dark");document.documentElement.setAttribute("data-theme","dark");}else{var d=t==="dark"||(t==="system"&&window.matchMedia("(prefers-color-scheme:dark)").matches)||t==="system";document.documentElement.setAttribute("data-theme",d?"dark":"light");}}();</script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Page header ─────────────────────────────── */
    .rec-hero {
      background: var(--ink2);
      border-bottom: 1px solid var(--border);
      padding: 100px 40px 60px;
      position: relative;
      overflow: hidden;
    }
    .rec-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 80% at 80% 50%, rgba(232,21,58,.05) 0%, transparent 70%);
    }
    .rec-hero-inner {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .rec-profile-bar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .rec-body-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: var(--red-lo);
      border: 1px solid var(--border-r);
    }
    .rec-body-badge i { color: var(--red); font-size: 14px; }
    .rec-body-badge strong {
      font-family: var(--font-d);
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      color: var(--white);
    }
    .rec-body-badge span {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .rec-bmi-chip {
      font-size: 11px;
      color: var(--muted);
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--ink3);
      font-weight: 600;
    }
    .rec-edit-link {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      transition: all .2s;
    }
    .rec-edit-link:hover { border-color: var(--muted); color: var(--white); }
    .rec-h1 {
      font-family: var(--font-d);
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--white), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      line-height: 1;
    }
    .rec-sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Filters bar ─────────────────────────────── */
    .rec-filters {
      background: var(--ink);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky;
      top: 56px;
      z-index: 50;
    }
    .rec-filters-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .rec-ftab {
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all .2s;
      margin-bottom: -1px;
    }
    .rec-ftab:hover { color: var(--white); }
    .rec-ftab.active { color: var(--white); border-bottom-color: var(--red); }

    /* ── Body type info card ─────────────────────── */
    .rec-body-info {
      background: var(--ink2);
      border: 1px solid var(--border);
      padding: 28px 32px;
      margin-bottom: 40px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 28px;
    }
    .rbi-icon {
      width: 56px;
      height: 56px;
      background: var(--red-lo);
      border: 1px solid var(--border-r);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--red);
      flex-shrink: 0;
    }
    .rbi-text h3 {
      font-family: var(--font-d);
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 4px;
    }
    .rbi-text p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }
    .rbi-stats {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .rbi-count {
      font-family: var(--font-d);
      font-size: 2rem;
      color: var(--gold);
      line-height: 1;
      letter-spacing: 1px;
    }
    .rbi-count-label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Style sections ──────────────────────────── */
    .rec-section {
      margin-bottom: 56px;
    }
    .rec-section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }
    .rec-section-title {
      font-family: var(--font-d);
      font-size: 1.5rem;
      letter-spacing: 2.5px;
      color: var(--white);
    }
    .rec-section-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
      margin-top: 4px;
    }

    /* ── No profile state ────────────────────────── */
    .rec-no-profile {
      text-align: center;
      padding: 80px 40px;
    }
    .rec-no-profile i {
      font-size: 3rem;
      color: var(--border);
      display: block;
      margin-bottom: 20px;
    }
    .rec-no-profile h2 {
      font-family: var(--font-d);
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 12px;
    }
    .rec-no-profile p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      max-width: 400px;
      margin: 0 auto 28px;
    }

    /* ── Match badge on cards ────────────────────── */
    .prd-match-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 2;
      background: rgba(8,8,15,.88);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    @media (max-width: 760px) {
      .rec-hero { padding: 90px 16px 40px; }
      .rec-filters { padding: 0 16px; }
      .rec-body-info { grid-template-columns: 1fr; gap: 16px; }
      .rbi-stats { align-items: flex-start; flex-direction: row; gap: 16px; }
    }
  </style>
</head>
<body>
  <!-- Announce bar -->
  
  <script src="nav.js" data-page="outfits"></script>


  <!-- Hero -->
  <div class="rec-hero" id="rec-hero">
    <div class="rec-hero-inner">
      <div class="rec-profile-bar" id="rec-profile-bar">
        <!-- injected by JS -->
      </div>
      <h1 class="rec-h1" id="rec-h1">LOADING YOUR PICKS…</h1>
      <p class="rec-sub" id="rec-sub">Finding outfits that match your body type.</p>
    </div>
  </div>

  <!-- Style filter tabs -->
  <div class="rec-filters">
    <div class="rec-filters-inner">
      <button class="rec-ftab active" data-style="all" onclick="setStyleFilter(this,'all')">All Styles</button>
      <button class="rec-ftab" data-style="Tokyo Street" onclick="setStyleFilter(this,'Tokyo Street')">Tokyo Street</button>
      <button class="rec-ftab" data-style="Cyberpunk" onclick="setStyleFilter(this,'Cyberpunk')">Cyberpunk</button>
      <button class="rec-ftab" data-style="Minimal Anime" onclick="setStyleFilter(this,'Minimal Anime')">Minimal Anime</button>
      <button class="rec-ftab" data-style="Shibuya Casual" onclick="setStyleFilter(this,'Shibuya Casual')">Shibuya Casual</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="section" style="background:var(--ink);padding-top:40px;">
    <div class="container" id="rec-container">
      <!-- injected by JS -->
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="popup" class="popup">
    <div class="popup-content">
      <button class="popup-close" onclick="closePop()"><i class="fas fa-times"></i></button>
      <div style="text-align:center;padding:40px;">
        <div id="pop-ico" style="font-size:3rem;margin-bottom:20px;"></div>
        <h2 id="pop-title" style="font-family:var(--font-d);font-size:1.8rem;margin-bottom:14px;"></h2>
        <p id="pop-msg" style="color:var(--muted);"></p>
      </div>
    </div>
  </div>
  <button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>

  <script src="data.js"></script>
  <script src="js/utils.js"></script>
  <script src="main.js"></script>
  <script src="wishlist.js"></script>
  <script src="js/outfitRenderer.js"></script>
  <script src="js/recommendationEngine.js"></script>
  <script>
  // ── Use RecommendationEngine module (recommendationEngine.js) ──────
  // This page now delegates to js/recommendationEngine.js + js/outfitRenderer.js
  // for outfit-based recommendations, and falls back to product-level filtering
  // for the product grid view (legacy behaviour preserved).

  (async function initRecPage() {

    // ── Navbar scroll ─────────────────────────────────────────────
    const nb = document.getElementById('navbar');
    const pr = document.getElementById('nav-progress');
    window.addEventListener('scroll', () => {
      nb?.classList.toggle('scrolled', window.scrollY > 60);
      if (pr) pr.style.width = Math.min((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100, 100) + '%';
      document.getElementById('scroll-top')?.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    document.getElementById('nav-toggle')?.addEventListener('click', () => {
      document.getElementById('mob-ov')?.classList.add('on');
      document.getElementById('mob-menu')?.classList.add('on');
    });

    // ── Find My Style nav link ────────────────────────────────────

    // ── Auth ──────────────────────────────────────────────────────
    if (typeof updateNav === 'function') updateNav();
    if (typeof updateWishBadge === 'function') updateWishBadge();

    // ── Read profile using utils.js helpers ───────────────────────
    // bodyType is stored as 'bodyType' (no prefix) by bodyProfile.js
    const bodyType   = localStorage.getItem('bodyType');
    const bmi        = localStorage.getItem('sw_bmi');
    const height     = localStorage.getItem('sw_height');
    const weight     = localStorage.getItem('sw_weight');
    const stylePrefs = JSON.parse(localStorage.getItem('sw_stylePrefs') || '[]');

    const container = document.getElementById('rec-container');
    const h1El      = document.getElementById('rec-h1');
    const subEl     = document.getElementById('rec-sub');

    // ── No profile state ──────────────────────────────────────────
    if (!bodyType) {
      if (h1El) h1El.textContent  = 'NO PROFILE YET.';
      if (subEl) subEl.textContent = 'Set up your style profile to get personalised recommendations.';
      if (container) container.innerHTML = `
        <div class="rec-no-profile fade-in-section visible">
          <i class="fas fa-user-circle"></i>
          <h2>FIND YOUR FIT</h2>
          <p>Enter your body details and we'll match you with anime streetwear designed for your silhouette.</p>
          <a href="body-profile.html" class="cta-primary">Set Up My Profile <i class="fas fa-arrow-right"></i></a>
        </div>`;
      return;
    }

    // ── Profile bar (uses utils.js getBodyTypeMeta) ───────────────
    const meta = (typeof getBodyTypeMeta === 'function')
      ? getBodyTypeMeta(bodyType)
      : { icon: 'fas fa-user', desc: 'Your personalised picks are ready.' };

    const profileBar = document.getElementById('rec-profile-bar');
    if (profileBar) {
      profileBar.innerHTML = `
        <div class="rec-body-badge">
          <i class="${meta.icon}"></i>
          <span>Body Type</span>
          <strong>${bodyType}</strong>
        </div>
        ${bmi ? `<span class="rec-bmi-chip">BMI ${parseFloat(bmi).toFixed(1)}</span>` : ''}
        ${height && weight ? `<span class="rec-bmi-chip">${height}cm · ${weight}kg</span>` : ''}
        <a href="body-profile.html" class="rec-edit-link"><i class="fas fa-edit"></i> Edit Profile</a>`;
    }

    if (h1El) h1El.textContent  = `Recommended for your body type: ${bodyType}`;
    if (subEl) subEl.textContent = meta.desc;

    // ── Tab filter state ──────────────────────────────────────────
    let currentStyleFilter = 'all';

    window.setStyleFilter = function(btn, style) {
      document.querySelectorAll('.rec-ftab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      currentStyleFilter = style;
      renderRecSection();
    };

    // ── OUTFIT-BASED VIEW (uses RecommendationEngine) ─────────────
    // Load outfits and try to render them via outfitRenderer.js
    let outfitsRendered = false;
    const outfitContainerId = 'rec-outfit-container';

    if (container && typeof RecommendationEngine !== 'undefined') {
      // Create two-part layout: outfit section + product section
      container.insertAdjacentHTML('beforebegin', `
        <div class="rec-outfit-section fade-in-section" id="rec-outfit-section">
          <div class="rec-section-head" style="margin-bottom:24px;">
            <div>
              <div class="sec-eyebrow">Curated Outfits</div>
              <h2 class="sec-title" style="font-size:clamp(1.5rem,3vw,2.2rem);">Complete Looks for Your Build</h2>
            </div>
            <a href="outfit.html" class="sec-link">All outfits <i class="fas fa-arrow-right"></i></a>
          </div>
          <div id="${outfitContainerId}"><div style="text-align:center;padding:40px;color:var(--muted);"><i class="fas fa-circle-notch fa-spin" style="font-size:1.5rem;"></i></div></div>
        </div>
        <div class="rec-section-divider" style="height:1px;background:var(--border);margin:40px 0;"></div>
        <div class="rec-product-section-head" style="margin-bottom:8px;">
          <div class="sec-eyebrow">Individual Pieces</div>
          <h2 class="sec-title" style="font-size:clamp(1.5rem,3vw,2.2rem);">Products for Your Body Type</h2>
        </div>`);

      try {
        const outfits = await RecommendationEngine.getRecommendations('all', 6);
        const outfitEl = document.getElementById(outfitContainerId);
        if (outfitEl && outfits.length && typeof renderOutfitGrid === 'function') {
          renderOutfitGrid(outfits, outfitEl, bodyType);
          outfitsRendered = true;
        } else if (outfitEl) {
          outfitEl.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:20px 0;">No curated outfits yet for your build — check back soon.</p>';
        }
      } catch(e) {
        console.warn('[Rec] Outfit load failed:', e);
      }
    }

    // ── PRODUCT-BASED VIEW (filtered product grid) ────────────────
    const STYLE_LABELS = {
      'Tokyo Street':   '東京 — bold graphics, dark palette, oversized energy',
      'Cyberpunk':      'サイバーパンク — neon accents, futuristic, high-contrast',
      'Minimal Anime':  'ミニマル — clean composition, subtle references, everyday wearability',
      'Shibuya Casual': '渋谷 — relaxed, modern, effortless street cool',
    };

    function getFilteredProducts() {
      if (!window.products) return [];
      return products.filter(p => {
        if (!p.bodyTypes || !p.bodyTypes.includes(bodyType)) return false;
        if (currentStyleFilter !== 'all' && p.style !== currentStyleFilter) return false;
        return true;
      });
    }

    function renderMatchCard(p) {
      const base = (typeof renderProductCard === 'function') ? renderProductCard(p) : '';
      return base.replace(
        '<div class="prd-ov">',
        `<div class="prd-match-badge"><i class="fas fa-check-circle"></i> ${bodyType} Match</div><div class="prd-ov">`
      );
    }

    function renderRecSection() {
      if (!container) return;
      const filtered = getFilteredProducts();

      if (!filtered.length) {
        container.innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted)"><i class="fas fa-box-open" style="font-size:2.5rem;display:block;margin-bottom:16px;opacity:.3"></i><p>No items in this style. Try a different filter.</p></div>`;
        return;
      }

      const recCount = filtered.filter(p => p.category === 'Apparel').length;
      let html = `
        <div class="rec-body-info fade-in-section">
          <div class="rbi-icon"><i class="${meta.icon}"></i></div>
          <div class="rbi-text"><h3>${bodyType} Build</h3><p>${meta.desc}</p></div>
          <div class="rbi-stats"><span class="rbi-count">${recCount}</span><span class="rbi-count-label">Apparel Matches</span></div>
        </div>`;

      const STYLES = currentStyleFilter === 'all'
        ? ['Tokyo Street', 'Cyberpunk', 'Minimal Anime', 'Shibuya Casual']
        : [currentStyleFilter];

      STYLES.forEach(style => {
        const items = filtered.filter(p => p.style === style && p.category === 'Apparel');
        if (!items.length) return;
        const sorted = [...items].sort((a, b) =>
          (stylePrefs.includes(a.style) ? -1 : 0) - (stylePrefs.includes(b.style) ? -1 : 0)
        );
        const preferred = stylePrefs.includes(style);
        html += `
          <div class="rec-section fade-in-section">
            <div class="rec-section-head">
              <div>
                <div class="rec-section-title">${style}${preferred ? ' <span style="color:var(--gold);font-size:.7em;">★ YOUR STYLE</span>' : ''}</div>
                <div class="rec-section-sub">${STYLE_LABELS[style] || ''}</div>
              </div>
              <a href="collection.html?style=${encodeURIComponent(style)}" class="sec-link">View all <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="prd-grid">${sorted.slice(0, 8).map(renderMatchCard).join('')}</div>
          </div>`;
      });

      const acc = filtered.filter(p => p.category !== 'Apparel');
      if (acc.length && currentStyleFilter === 'all') {
        html += `
          <div class="rec-section fade-in-section">
            <div class="rec-section-head"><div><div class="rec-section-title">Complete the Look</div><div class="rec-section-sub">Accessories &amp; collectibles</div></div></div>
            <div class="prd-grid">${acc.slice(0, 4).map(renderMatchCard).join('')}</div>
          </div>`;
      }

      container.innerHTML = html;

      const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
      }, { threshold: 0.05 });
      container.querySelectorAll('.fade-in-section').forEach(e => io.observe(e));

      if (typeof updateWishBadge === 'function') updateWishBadge();
    }

    renderRecSection();

    // ── Fade-in observer ──────────────────────────────────────────
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.05 });
    document.querySelectorAll('.fade-in-section').forEach(e => io.observe(e));

  })();
  </script>
</body>
</html>
